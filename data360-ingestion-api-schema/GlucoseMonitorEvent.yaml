openapi: 3.0.3

info:
  title: GlucoseMonitorEvent
  version: 1.0.0

components:
  schemas:
    GlucoseMonitorEvent:
      type: object
      required:
        - eventId
        - patientId
        - dateTimeStamp
        - bloodSugarReading
        - level
      properties:
        eventId:
          type: string
          x-sfdc-field-type: text
          description: >
            Universally unique identifier (UUID v4) generated by the app
            for each event. Used as the deduplication key in Data Cloud.
        patientId:
          type: string
          x-sfdc-field-type: text
          description: Unique identifier for the patient.
        dateTimeStamp:
          type: string
          format: date-time
          x-sfdc-field-type: datetime
          description: >
            ISO 8601 UTC timestamp of the reading.
            Format: yyyy-MM-ddTHH:mm:ss.SSSZ
        bloodSugarReading:
          type: number
          x-sfdc-field-type: number
          description: Blood glucose concentration in mg/dL.
        level:
          type: string
          x-sfdc-field-type: text
          description: >
            Clinical classification based on mg/dL thresholds:
            Dangerously Low (<54), Low (54-69), Normal (70-180),
            High (181-250), Dangerously High (>250).
          enum:
            - Dangerously Low
            - Low
            - Normal
            - High
            - Dangerously High
